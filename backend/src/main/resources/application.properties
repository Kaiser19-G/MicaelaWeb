# ==============================================================================
#  application.properties – I.E. Micaela Bastidas Puyocahua
#  Spring Boot 3.5.3 | Supabase / PostgreSQL
# ==============================================================================

# ── Información de la Aplicación ────────────────────────────────────────────
spring.application.name=bastidas-backend
server.port=${PORT:8080}
server.servlet.context-path=/api/v1

# ── Base de Datos – Supabase (PostgreSQL) ────────────────────────────────────
#
# ⚠ AVISO IPv4: Tu red doméstica/ISP peruano es IPv4.
#   La conexión directa (db.*.supabase.co) requiere IPv6 o pagar add-on.
#   SOLUCIÓN GRATUITA: usa el Session Pooler (puerto 5432, IPv4 compatible).
#   Cómo obtener la URL del Pooler:
#     Supabase Dashboard → Settings → Database → Connection Pooling
#     → Mode: Session  → copia Host + Puerto
#   El host del pooler tiene formato: aws-0-<region>.pooler.supabase.com
#   El usuario del pooler tiene formato: postgres.<PROJECT_REF>
#
# --- OPCIÓN A: Session Pooler (IPv4, RECOMENDADO para redes locales/domésticas) ---
spring.datasource.url=${SUPABASE_DB_URL}&prepareThreshold=0
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
#
# --- OPCIÓN B: Conexión directa (IPv6 / si compras el add-on IPv4) ---
# spring.datasource.url=jdbc:postgresql://db.eturiztmuxpklmlkyfii.supabase.co:5432/postgres
# spring.datasource.username=postgres
# spring.datasource.password=sb_secret_4RopwbnChPkbLtDfqbjn9w_PfXtBm3N

# Connection Pool (HikariCP)
spring.datasource.hikari.pool-name=BastidassPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
# ℹ Las tablas se crean manualmente en Supabase SQL Editor (ver script sql adjunto).
# El Session Pooler no permite operaciones DDL (CREATE/DROP TABLE).
# Para desarrollo local con conexión directa IPv6 puedes usar 'create' o 'update'.
# Para el primer arranque usa 'create' o 'update' para generar las tablas;
# en producción siempre usa 'validate' o 'none' con Flyway/Liquibase.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=true

# ── Multipart (subida de evidencias / fotos de exámenes / materiales) ────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ── JWT ──────────────────────────────────────────────────────────────────────
# Genera un secreto con: openssl rand -base64 64  (necesitas al menos 256 bits)
# REEMPLAZA este placeholder con tu secreto real antes de arrancar:
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ── CORS – Angular Dev Server ────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ── Supabase REST / Storage (para subir evidencias a Supabase Storage) ───────
app.supabase.url=${SUPABASE_URL}
app.supabase.anon-key=${SUPABASE_ANON_KEY}
app.supabase.service-key=${SUPABASE_SERVICE_KEY}
app.supabase.bucket-evidencias=evidencias

# ── Logging ──────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.colegio.bastidas=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── SpringDoc / Swagger UI ────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
spring.jackson.serialization.fail-on-empty-beans=false
