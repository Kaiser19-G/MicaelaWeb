# application-test.properties
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Configuration
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate para H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT - Dummy secret for tests
app.jwt.secret=un_secreto_muy_seguro_solo_para_pruebas_en_memoria_h2_2026_un_secreto_muy_seguro_solo_para_pruebas_en_memoria_h2_2026
app.jwt.expiration-ms=86400000

# Supabase - Dummy config for tests
app.supabase.url=https://dummy.supabase.co
app.supabase.anon-key=dummy-anon-key
app.supabase.service-key=dummy-service-key
app.supabase.bucket-evidencias=evidencias-test
